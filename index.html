<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyecon Name Finder | KGF Cyber Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #0b0f1a;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(129, 140, 248, 0.05) 0%, transparent 20%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .gradient-text {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .custom-input {
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(51, 65, 85, 1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .shimmer-btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
        }

        .shimmer-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-25deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            100% { left: 150%; }
        }

        #jsonResult::-webkit-scrollbar {
            width: 5px;
        }
        #jsonResult::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div class="text-center mb-10 animate-in fade-in zoom-in duration-700">
        <div class="inline-block p-3 rounded-2xl bg-sky-500/10 mb-4 border border-sky-500/20">
            <i class="fa-solid fa-shield-halved text-3xl text-sky-400"></i>
        </div>
        <h1 class="text-4xl font-extrabold gradient-text tracking-tight mb-2">EYECON LOOKUP</h1>
        <p class="text-slate-400 text-sm font-light uppercase tracking-[0.2em]">KGF Cyber Security Intelligence</p>
    </div>

    <div class="glass-card w-full max-w-lg rounded-3xl p-8 md:p-10 transition-all">
        
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-2">
                <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">System Ready</span>
            </div>
            <span class="text-[10px] text-slate-500 font-mono">v4.2.0-NodeJS</span>
        </div>

        <div class="space-y-6">
            <div class="group">
                <label for="phone" class="block text-slate-400 text-xs font-semibold mb-3 ml-1 uppercase tracking-wider">Phone Number with Country Code</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-sky-400 transition-colors">
                        <i class="fa-solid fa-globe"></i>
                    </div>
                    <input type="text" id="phone" 
                        class="custom-input w-full rounded-2xl py-4 pl-12 pr-4 text-white outline-none placeholder:text-slate-700 text-lg font-medium"
                        placeholder="e.g. 88017XXXXXXXX"
                        onkeypress="if(event.key === 'Enter') lookup()">
                </div>
            </div>

            <button onclick="lookup()" id="searchBtn"
                class="shimmer-btn w-full text-slate-950 font-black py-4 rounded-2xl transition-all flex items-center justify-center space-x-3 active:scale-[0.98] shadow-lg shadow-sky-500/20">
                <i class="fa-solid fa-bolt-lightning"></i>
                <span>GET IDENTITY</span>
            </button>
        </div>

        <div id="loading" class="hidden mt-10">
            <div class="flex flex-col items-center space-y-4">
                <div class="flex space-x-2">
                    <div class="h-2 w-2 bg-sky-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                    <div class="h-2 w-2 bg-sky-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                    <div class="h-2 w-2 bg-sky-500 rounded-full animate-bounce"></div>
                </div>
                <p class="text-slate-500 text-xs font-medium animate-pulse uppercase tracking-widest">Accessing Eyecon Database...</p>
            </div>
        </div>

        <div id="resultContainer" class="hidden mt-10 space-y-4 animate-in slide-in-from-top-4 duration-500">
            <div class="flex items-center justify-between px-1">
                <h3 class="text-sky-400 text-xs font-bold uppercase tracking-wider">Search Results</h3>
                <button onclick="copyResult()" class="text-slate-500 hover:text-white text-xs transition-colors">
                    <i class="fa-regular fa-copy mr-1"></i> Copy
                </button>
            </div>
            <div class="bg-black/40 rounded-2xl p-5 border border-slate-800/50">
                <pre id="jsonResult" class="text-emerald-400 text-sm font-mono overflow-x-auto max-h-[300px] whitespace-pre-wrap leading-relaxed"></pre>
            </div>
        </div>

        <div id="errorBox" class="hidden mt-6 p-4 bg-red-500/5 border border-red-500/20 rounded-2xl flex items-center space-x-4">
            <div class="bg-red-500/20 p-2 rounded-lg">
                <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
            </div>
            <p id="errorMsg" class="text-red-400 text-xs font-medium"></p>
        </div>
    </div>

    <div class="mt-12 text-center space-y-3 opacity-40 hover:opacity-100 transition-opacity">
        <p class="text-[10px] text-slate-500 font-medium tracking-[0.3em] uppercase">Developed By Kalyan King</p>
        <div class="flex items-center justify-center space-x-6 text-slate-400">
            <i class="fa-brands fa-github hover:text-white cursor-pointer transition-colors"></i>
            <i class="fa-brands fa-telegram hover:text-white cursor-pointer transition-colors"></i>
            <i class="fa-solid fa-code hover:text-white cursor-pointer transition-colors"></i>
        </div>
    </div>

    <script>
        async function lookup() {
            const phone = document.getElementById('phone').value.trim();
            const btn = document.getElementById('searchBtn');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('resultContainer');
            const errorBox = document.getElementById('errorBox');
            const jsonResult = document.getElementById('jsonResult');

            if (!phone) {
                alert("Please enter a valid phone number!");
                return;
            }

            // State Management
            btn.disabled = true;
            btn.style.opacity = "0.7";
            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            errorBox.classList.add('hidden');

            try {
                // Netlify Function API URL
                const response = await fetch(`/.netlify/functions/lookup?number=${encodeURIComponent(phone)}`);
                const data = await response.json();

                if (response.ok) {
                    // Show result
                    jsonResult.textContent = JSON.stringify(data, null, 4);
                    resultContainer.classList.remove('hidden');
                    
                    // Smooth scroll to result
                    setTimeout(() => {
                        resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 100);
                } else {
                    throw new Error(data.error || "Failed to fetch data");
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = err.message;
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
                loading.classList.add('hidden');
            }
        }

        function copyResult() {
            const text = document.getElementById('jsonResult').textContent;
            navigator.clipboard.writeText(text);
            alert("Results copied to clipboard!");
        }
    </script>
</body>
</html>
